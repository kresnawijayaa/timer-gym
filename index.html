<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#171713" />
    <meta name="description" content="Timer olahraga 30 detik yang besar, lantang, dan mudah dilihat." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect width=%2264%22 height=%2264%22 fill=%22%23171713%22/><path d=%22M12 13h40v10H38v29H26V23H12z%22 fill=%22%23d9ff45%22/></svg>" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,600;0,700;0,800;0,900;1,800&family=Barlow:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <title>SET/30 — Workout Timer</title>
  </head>
  <body>
    <main class="timer" id="timer" data-phase="idle">
      <header class="topbar">
        <div class="brand" aria-label="SET 30 workout timer">
          <span class="brand-mark">SET</span><span class="brand-slash">/</span><span>30</span>
        </div>
        <div class="status" id="status" aria-live="polite">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="statusText">SIAP</span>
        </div>
      </header>

      <section class="display" aria-labelledby="timerLabel">
        <div class="rail" aria-hidden="true"><span id="progress"></span></div>
        <p class="eyebrow" id="timerLabel">WORK INTERVAL</p>
        <output class="digits" id="digits" aria-live="off" aria-label="30 detik">30</output>
        <p class="unit">DETIK</p>
      </section>

      <section class="duration" aria-label="Atur durasi">
        <button class="stepper" id="minus" type="button" aria-label="Kurangi 5 detik">−</button>
        <div>
          <span class="duration-label">DURASI</span>
          <span class="duration-value"><b id="durationValue">30</b> SEC</span>
        </div>
        <button class="stepper" id="plus" type="button" aria-label="Tambah 5 detik">+</button>
      </section>

      <section class="controls" aria-label="Kontrol timer">
        <button class="start-button" id="start" type="button">
          <span class="start-icon" aria-hidden="true"></span>
          <span id="startText">MULAI</span>
        </button>
        <button class="reset-button" id="reset" type="button">RESET</button>
      </section>

      <footer class="options" aria-label="Opsi peringatan">
        <button class="option is-on" id="soundToggle" type="button" aria-pressed="true">
          <span class="option-icon" aria-hidden="true">◖))</span>
          <span><b>SUARA</b><small id="soundState">NYALA</small></span>
        </button>
        <button class="option is-on" id="lightToggle" type="button" aria-pressed="true">
          <span class="option-icon beacon" aria-hidden="true">✦</span>
          <span><b>CAHAYA</b><small id="lightState">NYALA</small></span>
        </button>
      </footer>

      <section class="times-up" id="timesUp" hidden>
        <div class="marquee"><span>TIME'S UP&nbsp;&nbsp; TIME'S UP&nbsp;&nbsp; TIME'S UP&nbsp;&nbsp;</span></div>
        <button id="again" type="button">ULANGI SET</button>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
